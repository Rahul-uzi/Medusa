<!DOCTYPE html>
<html lang="en">

<head>
<style id="nav-pt-style">
    #nav-page-transition {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background-color: #120307;
        z-index: 999999;
        opacity: 1;
        transition: opacity 0.32s cubic-bezier(0.4, 0, 0.2, 1);
        pointer-events: all;
    }
    #nav-page-transition.nav-pt-fadeout {
        opacity: 0 !important;
        pointer-events: none !important;
    }
</style>

<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Menu - Medusa</title>
    <!-- Global Theme Controller -->
    <script src="assets/js/theme-toggle.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/components.css">

    <!-- Tailwind CSS -->
    <script>
    const originalWarn = console.warn;
    console.warn = function(...args) {
        if (args[0] && typeof args[0] === 'string' && args[0].includes('cdn.tailwindcss.com should not be used in production')) return;
        originalWarn.apply(console, args);
    };
</script>
<script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cream: '#f9f6f0',
                        'cream-dark': '#e6dfd3',
                        maroon: '#2f1317',
                        rosewood: '#4a151b',
                        gold: '#dfba86',
                        'gold-dark': '#b8973a',
                        'text-dark': '#1a1a1a',
                        'text-muted': '#666666',
                    },
                    fontFamily: {
                        serif: ['"Playfair Display"', 'Georgia', 'serif'],
                        sans: ['Inter', 'sans-serif'],
                    },
                    animation: {
                        'fade-up': 'fadeUp 0.6s ease-out forwards',
                        'slide-in': 'slideIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards',
                    },
                    keyframes: {
                        fadeUp: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        slideIn: {
                            '0%': { opacity: '0', transform: 'scale(0.8) translateY(20px)' },
                            '100%': { opacity: '1', transform: 'scale(1) translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>

    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap"
        rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: var(--cream);
            font-family: 'Inter', sans-serif;
            color: var(--text-dark);
            overflow-x: hidden;
        }

        /* Torn paper effect */
        .torn-paper {
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 100%;
            height: 30px;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 30" preserveAspectRatio="none"><path d="M0,30 L1200,30 L1200,10 L1180,25 L1160,5 L1140,20 L1120,10 L1100,30 L1080,15 L1060,25 L1040,5 L1020,20 L1000,10 L980,30 L960,15 L940,25 L920,5 L900,20 L880,10 L860,30 L840,15 L820,25 L800,5 L780,20 L760,10 L740,30 L720,15 L700,25 L680,5 L660,20 L640,10 L620,30 L600,15 L580,25 L560,5 L540,20 L520,10 L500,30 L480,15 L460,25 L440,5 L420,20 L400,10 L380,30 L360,15 L340,25 L320,5 L300,20 L280,10 L260,30 L240,15 L220,25 L200,5 L180,20 L160,10 L140,30 L120,15 L100,25 L80,5 L60,20 L40,10 L20,30 L0,10 Z" fill="%23f9f6f0" /></svg>');
            background-size: 100% 100%;
            z-index: 10;
        }

        /* Scrollbar for categories */
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .category-pill {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Snap scrolling utilities and dot styling */
        .snap-x {
            scroll-snap-type: x mandatory;
        }
        .snap-start {
            scroll-snap-align: start;
        }
        .carousel-dot {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Card Hover and visual transitions */
        .menu-card {
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1), box-shadow 0.4s cubic-bezier(0.25, 1, 0.5, 1), border-color 0.3s;
        }

        .menu-card:hover {
            transform: translateY(-6px) scale(1.01);
            box-shadow: 0 20px 40px rgba(25, 54, 39, 0.08);
            border-color: rgba(223, 186, 134, 0.3);
        }

        /* Modal specific */
        .cust-modal-overlay.show {
            display: flex;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .fade-up {
            opacity: 0;
            animation: fadeUp 0.6s ease-out forwards;
        }

        @keyframes fadeUp {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }

            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .category-divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 3rem 0 2rem;
        }

        .category-divider::before,
        .category-divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #dfba86;
        }

        .category-divider::before {
            margin-right: 1.5em;
        }

        .category-divider::after {
            margin-left: 1.5em;
        }
    </style>

    <!-- CRITICAL SPA PAGE TRANSITION CSS & SCRIPT -->
    <style>
        html, body { background-color: #120307; }
        #nav-page-transition {
            position: fixed;
            inset: 0;
            z-index: 99999;
            background: #120307;
            pointer-events: all;
            opacity: 1;
            transition: opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #nav-page-transition.nav-pt-fadeout {
            opacity: 0;
            pointer-events: none;
        }
    </style>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            var overlay = document.getElementById('nav-page-transition');
            if(overlay) {
                setTimeout(function() {
                    overlay.classList.add('nav-pt-fadeout');
                }, 100);
            }
        });
    </script>
</head>

<body class="bg-cream">
<div id="nav-page-transition"></div>

<!-- NAVBAR -->
    <div id="navbar-placeholder"></div>
    <script src="assets/js/navbar.js" defer></script>

    <!-- HERO SECTION -->
    <section class="relative w-full h-[50vh] min-h-[400px] flex items-center justify-center bg-black overflow-hidden">
        <div class="absolute inset-0 z-0">
            <img src="assets/images/hero_steak.png" alt="Restaurant Interior"
                class="w-full h-full object-cover opacity-70">
            <div class="absolute inset-0 bg-gradient-to-b from-black/70 via-black/30 to-black/70"></div>
        </div>
        <div class="relative z-10 text-center px-4 fade-up">
            <h1 class="font-serif text-5xl md:text-6xl text-white mb-4 section-title">Our Menu</h1>
            <div class="flex items-center justify-center gap-3 mb-6 opacity-80">
                <div class="h-px w-24 bg-gold-dark"></div>
                <i class="fas fa-fan text-gold-dark text-xs"></i>
                <div class="h-px w-24 bg-gold-dark"></div>
            </div>
            <p class="text-white max-w-xl mx-auto font-light leading-relaxed text-sm md:text-base">
                Discover a curated selection of dishes crafted with passion, the finest ingredients, and unforgettable
                flavors.
            </p>
        </div>
        <!-- Torn Paper Effect -->
        <div class="torn-paper"></div>
    </section>

    <!-- MAIN CONTENT -->
    <main class="container mx-auto px-4 md:px-8 lg:px-12 py-12 relative z-20">

        <!-- CATEGORY NAVIGATION -->
        <div class="w-full mb-12 fade-up relative group" style="animation-delay: 0.2s;">
            <button onclick="scrollCategories(-300)"
                class="absolute left-0 top-1/2 -translate-y-1/2 z-10 w-10 h-10 rounded-full bg-white shadow-lg border border-gold/30 flex items-center justify-center text-maroon hover:bg-cream transition-colors hidden md:flex opacity-0 group-hover:opacity-100 disabled:opacity-0 disabled:cursor-not-allowed"
                id="scrollLeftBtn">
                <i class="fas fa-chevron-left"></i>
            </button>

            <div class="flex gap-4 overflow-x-auto hide-scrollbar py-2 px-2 scroll-smooth cursor-grab active:cursor-grabbing"
                id="categoryScroll" onmousedown="startDrag(event)" onmouseleave="stopDrag()" onmouseup="stopDrag()"
                onmousemove="doDrag(event)" onscroll="updateScrollButtons()">
                <!-- Categories injected here -->
            </div>

            <button onclick="scrollCategories(300)"
                class="absolute right-0 top-1/2 -translate-y-1/2 z-10 w-10 h-10 rounded-full bg-white shadow-lg border border-gold/30 flex items-center justify-center text-maroon hover:bg-cream transition-colors hidden md:flex opacity-0 group-hover:opacity-100 disabled:opacity-0 disabled:cursor-not-allowed"
                id="scrollRightBtn">
                <i class="fas fa-chevron-right"></i>
            </button>
        </div>

        <!-- MENU ITEMS GRID -->
        <div id="menuContainer" class="min-h-[400px]">
            <div class="flex justify-center items-center h-40">
                <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-rosewood"></div>
            </div>
        </div>

    </main>

    <!-- FLOATING CART UI -->
    <div class="fixed bottom-24 right-6 w-72 bg-rosewood text-white p-5 rounded-2xl shadow-2xl flex flex-col gap-3 border border-gold/30 z-40 transform transition-transform"
        id="floatingCartBox" style="display:none;">
        <div class="flex justify-between items-center border-b border-white/10 pb-3 mb-1 gap-6">
            <span class="font-bold text-lg"><i class="fas fa-shopping-bag mr-2 text-gold"></i>Cart</span>
            <span id="floatingCartCount" class="text-base text-gold font-medium">0 Items</span>
        </div>
        <div class="flex justify-between items-center mb-1">
            <span class="text-base opacity-80">Total</span>
            <span class="font-serif font-bold text-2xl text-gold">₹<span id="floatingCartPrice">0</span></span>
        </div>
        <a href="carttest.html"
            class="bg-gold text-maroon text-center py-3 rounded-lg font-bold text-base hover:bg-gold-dark hover:text-white transition-colors shadow-lg mt-1">View
            Cart</a>
    </div>

    <!-- CUSTOMIZATION MODAL -->
    <div class="fixed inset-0 bg-black/80 backdrop-blur-sm z-[9000] hidden items-center justify-center p-4 cust-modal-overlay"
        id="custModalOverlay">
        <div class="bg-gradient-to-br from-cream to-white rounded-2xl w-full max-w-lg max-h-[90vh] overflow-y-auto shadow-2xl border border-gold/30 animate-slide-in relative"
            id="custModalBox">

            <!-- Header -->
            <div
                class="p-6 border-b border-gray-200 flex gap-4 items-start sticky top-0 bg-cream/95 backdrop-blur z-10">
                <img id="custDishImg" src="" alt=""
                    class="w-20 h-20 rounded-xl object-cover border border-gold/30 shadow-sm shrink-0">
                <div class="flex-1">
                    <h3 id="custDishName" class="font-serif text-xl font-bold text-maroon mb-1">Dish Name</h3>
                    <div class="text-rosewood font-medium">Base: ₹<span id="custBasePrice">0</span></div>
                </div>
                <button onclick="closeCustModal()"
                    class="w-8 h-8 rounded-full bg-black/5 hover:bg-black/10 flex items-center justify-center text-gray-500 transition-colors shrink-0">
                    <i class="fas fa-times"></i>

                    <span class="text-gray-500 font-medium">Total Price</span>
                    <span class="font-serif text-2xl font-bold text-rosewood">₹<span
                            id="custTotalDisplay">0</span></span>

                <button onclick="confirmCustomAddToCart()"
                    class="w-full bg-rosewood hover:bg-maroon text-gold font-semibold py-3.5 rounded-xl transition-all shadow-lg hover:shadow-xl flex items-center justify-center gap-2">
                    <i class="fas fa-cart-plus"></i> Add to Cart

    <!-- JAVASCRIPT -->
    <script>
        let allMenuItems = [];
        let localCart = {};
        let custCurrentItem = null;
        let activeCategory = 'All';

        // Check 36-hour cart expiry
        try {
            const timestamp = localStorage.getItem('foodie_cart_timestamp');
            if (timestamp) {
                const hours = (Date.now() - parseInt(timestamp)) / (1000 * 60 * 60);
                if (hours > 36) {
                    localStorage.removeItem('foodie_cart');
                    localStorage.removeItem('foodie_cart_timestamp');
                }
            }
        } catch (e) { }

        // Load cart from localStorage
        try {
            const savedCart = localStorage.getItem('foodie_cart');
            if (savedCart) {
                const parsed = JSON.parse(savedCart);
                if (Array.isArray(parsed)) {
                    parsed.forEach(i => { localCart[i.id || i.food_item_id] = i.quantity; });
                } else {
                    localCart = parsed;
                }
            }
        } catch (e) { localCart = {}; }

        const ICONS = {
            'All': 'fas fa-utensils',
            'Beverages': 'fas fa-wine-glass-alt',
            'Beverage': 'fas fa-wine-glass-alt',
            'Soups': 'fas fa-mug-hot',
            'Salad': 'fas fa-leaf',
            'Bread Basket': 'fas fa-bread-slice',
            'Sides': 'fas fa-cheese',
            'Meals in the Bowl': 'fas fa-concierge-bell',
            'Main Course': 'fas fa-utensils',
            'Choice of Noodle': 'fas fa-wave-square',
            'Choice of Rice': 'fas fa-seedling',
            'Choice of Gravy': 'fas fa-tint',
            'Chinese & Korean': 'fas fa-bowl-rice',
            'Indian': 'fas fa-pepper-hot',
            'Dim Sum Cart': 'fas fa-box-open',
            'Sushi Rolls': 'fas fa-fish',
            'Burgers & Sandwiches': 'fas fa-hamburger',
            'Sharing Boards': 'fas fa-pizza-slice',
            'Brick Oven Pizza': 'fas fa-pizza-slice',
            'Non-Veg Appetizer': 'fas fa-drumstick-bite',
            'Appetizers': 'fas fa-pepper-hot',
            'Appetizer': 'fas fa-drumstick-bite',
            'Pasta & Risotto Station': 'fas fa-plate-wheat',
            'Veg Appetizer': 'fas fa-leaf',
            'Veg Indian Main Course': 'fas fa-seedling',
            'Non-Veg Indian Main Course': 'fas fa-drumstick-bite',
            'Tandoori Starter': 'fas fa-fire'
        };

        document.addEventListener('DOMContentLoaded', () => {
            // QR Code Dine-In Mode Logic
            const params = new URLSearchParams(window.location.search);
            const tableCode = params.get('table');
            if (tableCode) {
                const navBrand = document.getElementById('navBrand');
                if (navBrand) navBrand.href = '#';
                const navBack = document.getElementById('navBack');
                if (navBack) navBack.style.display = 'none';
                const navAccount = document.getElementById('navAccount');
                if (navAccount) navAccount.style.display = 'none';
                const navLogout = document.getElementById('navLogout');
                if (navLogout) navLogout.style.display = 'none';

                const navMenu = document.getElementById('navMenu');
                if (navMenu) navMenu.href = 'menutest.html?table=' + tableCode;
                const navCart = document.getElementById('navCart');
                if (navCart) navCart.href = 'carttest.html?table=' + tableCode;

                const navBill = document.getElementById('navBill');
                if (navBill) {
                    navBill.style.display = 'inline-block';
                    navBill.href = 'carttest.html?table=' + tableCode + '&view_bill=true';
                }

                const titleEl = document.querySelector('.section-title');
                if (titleEl) {
                    titleEl.innerHTML = `Our Menu <br><span class="text-gold text-2xl font-light font-sans block mt-2">Table ${tableCode}</span>`;
                }
            }

            if (tableCode) localStorage.setItem('table_number', tableCode);

            loadMenu().then(() => {
                const cat = params.get('category');
                if (cat) filterCategory(cat);
            });
        });

        let allCategories = [];

        async function loadMenu() {
            try {
                const res = await fetch('api/get-menu.php', {
                    headers: { 'Accept': 'application/json' }
                });
                if (!res.ok) throw new Error('Network error');
                const result = await res.json();
                if (result.success && result.data && result.data.length > 0) {
                    allMenuItems = result.data;
                    allCategories = result.categories && result.categories.length > 0 ? result.categories : [...new Set(allMenuItems.map(i => i.category).filter(Boolean))];
                    renderCategories();
                    displayMenuItems();
                    updateCartCount();
                    return;
                }
                throw new Error('Empty menu');
            } catch (err) {
                console.warn('API failed, using fallback mock data.', err);
                allMenuItems = [
                    { id: 1, name: 'Margherita Pizza', description: 'Fresh mozzarella, tomato sauce, basil', price: '299.00', image_url: '', category: 'Brick Oven Pizza', customizations: [] },
                    { id: 2, name: 'Butter Chicken', description: 'Creamy tomato curry with tender chicken', price: '349.00', image_url: '', category: 'Main Course', customizations: [] },
                    { id: 3, name: 'Beef Carpaccio', description: 'Thinly sliced prime beef with arugula, parmesan, and truffle oil.', price: '450.00', image_url: '', category: 'Appetizers', customizations: [] },
                    { id: 4, name: 'Burrata & Heirloom Tomatoes', description: 'Creamy burrata with heirloom tomatoes, basil oil, and aged balsamic.', price: '380.00', image_url: '', category: 'Appetizers', customizations: [] },
                    { id: 5, name: 'Seared Scallops', description: 'Pan-seared scallops with cauliflower puree, chives, and brown butter.', price: '520.00', image_url: '', category: 'Appetizers', customizations: [] }
                ];
                allCategories = [...new Set(allMenuItems.map(i => i.category).filter(Boolean))];
                renderCategories();
                displayMenuItems();
                updateCartCount();
            }
        }

        function renderCategories() {
            const container = document.getElementById('categoryScroll');
            const categories = ['All', ...allCategories];

            container.innerHTML = categories.map((cat, index) => {
                const icon = ICONS[cat] || 'fas fa-utensils';
                const isActive = cat === activeCategory;
                const circleClasses = isActive
                    ? 'bg-[#193627] text-[#dfba86] border-[#193627] shadow-md scale-105'
                    : 'bg-[#f8f6f0] text-[#dfba86]/70 border-[#dfba86]/30 hover:border-[#dfba86] hover:bg-[#dfba86]/5';
                const textClasses = isActive
                    ? 'text-[#193627] font-extrabold'
                    : 'text-gray-600 hover:text-[#193627] font-medium';

                return `
                    <div class="flex flex-col items-center shrink-0">
                        <button onclick="filterCategory('${cat}')" 
                                class="category-pill flex flex-col items-center justify-center p-0 transition-all border-0 bg-transparent outline-none cursor-pointer">
                            <div class="w-16 h-16 rounded-full flex items-center justify-center border transition-all ${circleClasses}">
                                <i class="${icon} text-[22px]"></i>
                            </div>
                            <span class="text-[9px] font-bold uppercase tracking-widest mt-2 whitespace-nowrap ${textClasses}">${cat}</span>
                        </button>
                    </div>
                `;
            }).join('');
            setTimeout(updateScrollButtons, 50);
        }

        function filterCategory(catName) {
            activeCategory = catName;
            renderCategories();
            displayMenuItems();
        }

        // Helper to generate dynamic banner
        window.renderExploreCategoriesBanner = function() {
            const bannerCategories = [
                { name: 'Soups', label: 'Soups' },
                { name: 'Salad', label: 'Salad' },
                { name: 'Bread Basket', label: 'Bread Basket' },
                { name: 'Sides', label: 'Sides' },
                { name: 'Meals in the Bowl', label: 'Meals in the Bowl' },
                { name: 'Main Course', label: 'Main Course' },
                { name: 'Choice of Noodle', label: 'Noodles' },
                { name: 'Choice of Rice', label: 'Rice' }
            ];

            const itemsHtml = bannerCategories.map(cat => {
                const itemWithImg = allMenuItems.find(i => i.category === cat.name && i.image_url);
                let imgSrc = itemWithImg ? itemWithImg.image_url : '';
                if (imgSrc && !imgSrc.startsWith('http') && !imgSrc.startsWith('//')) {
                    if (!imgSrc.startsWith('uploads/')) {
                        imgSrc = 'uploads/' + imgSrc;
                    }
                }
                if (!imgSrc) {
                    if (cat.name === 'Choice of Noodle') imgSrc = 'https://images.unsplash.com/photo-1585032226651-759b368d7246?w=200&h=200&fit=crop';
                    else if (cat.name === 'Choice of Rice') imgSrc = 'https://images.unsplash.com/photo-1512058564366-18510be2db19?w=200&h=200&fit=crop';
                    else imgSrc = 'https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=200&h=200&fit=crop';
                }

                return `
                    <div onclick="filterCategory('${cat.name}'); window.scrollTo({top: document.getElementById('categoryScroll').offsetTop - 100, behavior: 'smooth'});" 
                         class="flex flex-col items-center gap-2 cursor-pointer group shrink-0">
                        <div class="w-16 h-16 md:w-20 md:h-20 rounded-full border-2 border-[#dfba86]/30 overflow-hidden group-hover:scale-105 group-hover:border-[#dfba86] transition-all duration-300 shadow-md">
                            <img src="${imgSrc}" alt="${cat.label}" class="w-full h-full object-cover">
                        </div>
                        <span class="text-[9px] md:text-[10px] font-bold text-[#dfba86]/90 group-hover:text-[#dfba86] transition-colors uppercase tracking-widest text-center max-w-[80px]">${cat.label}</span>
                    </div>
                `;
            }).join('');

            return `
                <div class="w-full bg-[#193627] border border-[#dfba86]/30 rounded-3xl p-6 md:p-8 my-16 text-center shadow-lg flex flex-col items-center justify-center fade-up">
                    <div class="relative w-full flex items-center justify-center mb-6">
                        <div class="absolute left-0 right-0 h-[1px] bg-[#dfba86]/20 flex items-center justify-between pointer-events-none">
                            <div class="w-1/4 border-t border-[#dfba86]/20"></div>
                            <div class="w-1/4 border-t border-[#dfba86]/20"></div>
                        </div>
                        <span class="relative font-serif text-sm md:text-base font-bold text-[#dfba86] uppercase tracking-widest px-4 bg-[#193627] z-10 flex items-center gap-2">
                            <i class="fas fa-star text-[10px] text-[#dfba86]"></i> Explore Our Categories <i class="fas fa-star text-[10px] text-[#dfba86]"></i>
                        </span>
                    </div>
                    <div class="flex items-center justify-center gap-4 md:gap-8 w-full overflow-x-auto hide-scrollbar py-2">
                        ${itemsHtml}
                    </div>
                </div>
            `;
        };

        // Scroll helper for chevrons
        window.scrollCarousel = function(catId, direction) {
            const carousel = document.getElementById(`carousel-${catId}`);
            if (!carousel) return;
            carousel.scrollBy({ left: direction * carousel.clientWidth, behavior: 'smooth' });
        };

        // Scroll helper for page dots
        window.scrollToPage = function(catId, pageIdx) {
            const carousel = document.getElementById(`carousel-${catId}`);
            if (!carousel) return;
            carousel.scrollTo({ left: pageIdx * carousel.clientWidth, behavior: 'smooth' });
        };

        // Update indicators on scroll
        window.updateCarouselDots = function(catId) {
            const carousel = document.getElementById(`carousel-${catId}`);
            if (!carousel) return;
            const scrollIndex = Math.round(carousel.scrollLeft / carousel.clientWidth);
            const dotsContainer = document.getElementById(`dots-${catId}`);
            if (!dotsContainer) return;
            const dots = dotsContainer.querySelectorAll('.carousel-dot');
            dots.forEach((dot, idx) => {
                if (idx === scrollIndex) {
                    dot.classList.add('bg-[#193627]', 'w-4');
                    dot.classList.remove('bg-[#dfba86]/40', 'w-2');
                } else {
                    dot.classList.remove('bg-[#193627]', 'w-4');
                    dot.classList.add('bg-[#dfba86]/40', 'w-2');
                }
            });

            const prevBtn = document.getElementById(`prevBtn-${catId}`);
            const nextBtn = document.getElementById(`nextBtn-${catId}`);
            if (prevBtn) prevBtn.disabled = carousel.scrollLeft <= 5;
            if (nextBtn) nextBtn.disabled = Math.ceil(carousel.scrollLeft) >= carousel.scrollWidth - carousel.clientWidth - 5;
        };

        function generateCardHtml(item, index, isCarousel) {

                    <div class="relative h-48 w-full rounded-2xl overflow-hidden bg-gray-100 mb-4 shrink-0 shadow-inner">
                        <img src="${imgSrc}" alt="${item.name}" class="w-full h-full object-cover" onerror="this.src='https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=500&h=400&fit=crop'">
                        ${hasCust ? '<div class="absolute top-3 left-3 bg-[#f9f6f0]/90 backdrop-blur-sm text-[#193627] text-[10px] font-bold px-3 py-1 rounded-full uppercase tracking-wider shadow-sm"><i class="fas fa-sliders-h mr-1 text-[#dfba86]"></i>Customizable</div>' : ''}

                                <button onclick="changeQuantity(${item.id}, -1)" class="w-8 h-8 rounded-full bg-white/10 hover:bg-white/20 text-white flex items-center justify-center border-0 cursor-pointer transition-colors"><i class="fas fa-minus text-[9px]"></i></button>

                        subCats.forEach(sub => {
                            const subcatId = (cat.replace(/[^a-zA-Z0-9]/g, '') + sub.replace(/[^a-zA-Z0-9]/g, ''));

        // Keep cart functions mostly intact, just update UI classes if needed.
        function handleAddToCart(id) {
            const item = allMenuItems.find(i => i.id == id);
            if (!item) return;
            if (item.customizations && item.customizations.length > 0) openCustModal(item);
            else addToCart(id, {}, parseFloat(item.price));
        }

        function toggleCartUI(id, isAdded) {
            const addBtn = document.getElementById(`add-btn-${id}`);
            const qtyCtrl = document.getElementById(`qty-controller-${id}`);
            if (addBtn && qtyCtrl) {
                if (isAdded) {
                    addBtn.classList.add('hidden');
                    qtyCtrl.classList.remove('hidden');
                    qtyCtrl.classList.add('flex');
                } else {
                    addBtn.classList.remove('hidden');
                    qtyCtrl.classList.add('hidden');
                    qtyCtrl.classList.remove('flex');
                }
            }
        }

        function syncCartUI() {
            allMenuItems.forEach(i => toggleCartUI(i.id, false));
            for (const [id, qty] of Object.entries(localCart)) {
                if (qty > 0) {
                    const el = document.getElementById(`qty-${id}`);
                    if (el) el.textContent = qty;
                    toggleCartUI(id, true);
                }
            }
        }

        function renderCartUI(items) {
            const count = items.reduce((s, i) => s + i.quantity, 0);
            const cartCountEl = document.getElementById('cartCount');
            if (cartCountEl) cartCountEl.textContent = count;
            const floatCartCountEl = document.getElementById('floatingCartCount');
            if (floatCartCountEl) floatCartCountEl.textContent = `${count} Items`;

            const total = items.reduce((s, i) => s + i.price * i.quantity, 0);
            document.getElementById('floatingCartPrice').textContent = total.toFixed(0);

            const floatingBox = document.getElementById('floatingCartBox');
            if (count > 0) {
                floatingBox.style.display = 'flex';
                floatingBox.style.transform = 'translateY(0)';
            } else {
                floatingBox.style.transform = 'translateY(150%)';
                setTimeout(() => floatingBox.style.display = 'none', 300);
            }

            syncCartUI();
        }

        async function addToCart(id, customizations, finalPrice) {
            try {
                const res = await fetch('api/add-to-cart.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ food_item_id: id, quantity: 1, customizations, custom_price: finalPrice })
                });
                const result = await res.json();
                if (res.status === 401 || (result && result.message && result.message.includes('Unauthorized'))) {
                    const params = new URLSearchParams(window.location.search);
                    if (params.get('table')) throw new Error('Guest mode, using local cart');
                    else {
                        if (!window.hasAlertedForLogin) {
                            window.hasAlertedForLogin = true;
                            alert('Please login first to add items to cart.', () => {
                                window.location.href = 'login.html';
                            });
                        }
                        return;
                    }
                }
                if (result.success) {
                    localCart[id] = 1;
                    updateCartCount();
                } else throw new Error(result.message);
            } catch (err) {
                localCart[id] = 1;
                try {
                    let saved = JSON.parse(localStorage.getItem('foodie_cart') || '[]');
                    if (!saved.find(i => i.id == id)) {
                        const item = allMenuItems.find(i => i.id == id);
                        if (item) {
                            saved.push({
                                id: item.id,
                                name: item.name,
                                price: finalPrice || parseFloat(item.price),
                                image_url: item.image_url,
                                quantity: 1,
                                customizations: customizations
                            });
                        }
                    } else {
                        saved.find(i => i.id == id).quantity += 1;
                    }
                    localStorage.setItem('foodie_cart', JSON.stringify(saved));
                    localStorage.setItem('foodie_cart_timestamp', Date.now());
                } catch (e) { }
                updateCartCount();
            }
        }

        async function changeQuantity(id, change) {
            let currentQty = parseInt(localCart[id]) || 1;
            let qty = currentQty + parseInt(change);
            if (qty <= 0) {
                try {
                    let saved = JSON.parse(localStorage.getItem('foodie_cart') || '[]');
                    saved = saved.filter(i => i.id != id);
                    localStorage.setItem('foodie_cart', JSON.stringify(saved));
                } catch (e) { }
                delete localCart[id];
                toggleCartUI(id, false);
                updateCartCount();
                fetch('api/remove-from-cart.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ food_item_id: id })
                }).catch(() => { });
                return;
            }

            const el = document.getElementById(`qty-${id}`);
            if (el) el.textContent = qty;
            localCart[id] = qty;

            try {
                const res = await fetch('api/update-cart-qty.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ food_item_id: id, quantity: qty })
                });
                if (!res.ok && change > 0) {
                    await fetch('api/add-to-cart.php', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ food_item_id: id, quantity: 1 })
                    });
                }
            } catch (e) { }

            try {
                let saved = JSON.parse(localStorage.getItem('foodie_cart') || '[]');
                const existing = saved.find(i => i.id == id);
                if (existing) {
                    existing.quantity = qty;
                    localStorage.setItem('foodie_cart', JSON.stringify(saved));
                    localStorage.setItem('foodie_cart_timestamp', Date.now());
                }
            } catch (e) { }

            updateCartCount();
        }

        async function updateCartCount() {
            try {
                const res = await fetch('api/get-cart.php', {
                    headers: { 'Accept': 'application/json' }
                });
                const result = await res.json();
                if (res.status === 401 || (result && result.message && result.message.includes('Unauthorized'))) {
                    throw new Error('Guest mode');
                }
                if (result.success && result.items) {
                    localCart = {};
                    result.items.forEach(i => { localCart[i.id] = i.quantity; });
                    const formatted = result.items.map(i => ({
                        id: i.food_item_id || i.id,
                        name: i.name,
                        price: parseFloat(i.price),
                        image_url: i.image_url,
                        quantity: i.quantity
                    }));
                    renderCartUI(formatted);
                    localStorage.setItem('foodie_cart', JSON.stringify(formatted));
                    syncCartUI();
                    return;
                }
                throw new Error('Bad data');
            } catch (err) {
                if (Object.keys(localCart).length === 0) {
                    try {
                        const saved = JSON.parse(localStorage.getItem('foodie_cart') || '[]');
                        saved.forEach(i => { localCart[i.id] = i.quantity; });
                    } catch (e) { }
                }
                const formatted = Object.keys(localCart).map(k => {
                    const itemId = parseInt(k);
                    const itemData = allMenuItems.find(i => i.id == itemId);
                    return {
                        id: itemId,
                        name: itemData ? itemData.name : 'Item',
                        price: itemData ? parseFloat(itemData.price) : 0,
                        image_url: itemData ? itemData.image_url : '',
                        quantity: localCart[k]
                    };
                }).filter(i => i.quantity > 0);
                renderCartUI(formatted);
                localStorage.setItem('foodie_cart', JSON.stringify(formatted));
            }
        }

        /* CUSTOMIZATION LOGIC */
        function openCustModal(item) {
            custCurrentItem = item;
            const basePrice = parseFloat(item.price);

            let imgSrc = item.image_url || '';
            if (imgSrc && !imgSrc.startsWith('http') && !imgSrc.startsWith('//')) {
                if (!imgSrc.startsWith('uploads/')) {
                    imgSrc = 'uploads/' + imgSrc;
                }
            }
            if (!imgSrc) imgSrc = 'https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=200&h=200&fit=crop';

            document.getElementById('custDishImg').src = imgSrc;
            document.getElementById('custDishName').textContent = item.name;
            document.getElementById('custBasePrice').textContent = basePrice.toFixed(0);
            document.getElementById('custTotalDisplay').textContent = basePrice.toFixed(0);
            document.getElementById('custErrorMsg').classList.add('hidden');

            const body = document.getElementById('custModalBody');
            body.innerHTML = '';

            item.customizations.forEach((group, gi) => {
                const options = Array.isArray(group.options) ? group.options : [];
                const isRequired = parseInt(group.is_required) === 1;
                const isMultiple = group.group_type === 'multiple';

                const reqBadge = isRequired
                    ? '<span class="bg-red-100 text-red-600 text-xs px-2 py-0.5 rounded-full uppercase tracking-wider font-bold border border-red-200">Required</span>'
                    : '<span class="bg-gray-100 text-gray-500 text-xs px-2 py-0.5 rounded-full uppercase tracking-wider font-bold border border-gray-200">Optional</span>';

                let html = `
                    <div class="mb-6">
                        <div class="flex items-center gap-2 mb-3">
                            <h4 class="font-bold text-gray-800 uppercase tracking-wide text-sm">${group.group_name}</h4>
                            ${reqBadge}
                        </div>
                        <div class="space-y-2">
                `;

                options.forEach((opt, oi) => {
                    const inputType = isMultiple ? 'checkbox' : 'radio';
                    const inputName = `cust_g${gi}`;
                    const inputId = `cust_g${gi}_o${oi}`;
                    const priceAdd = parseFloat(opt.price_add) || 0;

                    let priceText = '', priceClass = 'text-gray-400';
                    if (priceAdd > 0) { priceText = `+₹${priceAdd}`; priceClass = 'text-rosewood font-medium'; }
                    else if (priceAdd < 0) { priceText = `-₹${Math.abs(priceAdd)}`; priceClass = 'text-green-600 font-medium'; }
                    else { priceText = 'Included'; }

                    html += `
                        <label for="${inputId}" class="flex items-center gap-3 p-3 border border-gray-200 rounded-xl cursor-pointer hover:border-gold hover:bg-gold/5 transition-colors group has-[:checked]:border-gold has-[:checked]:bg-gold/10">
                            <input type="${inputType}" id="${inputId}" name="${inputName}" value="${oi}" data-price="${priceAdd}" onchange="recalcTotal()" class="w-4 h-4 text-rosewood accent-rosewood border-gray-300 focus:ring-rosewood">
                            <span class="flex-1 text-gray-700 font-medium group-hover:text-rosewood transition-colors">${opt.label}</span>
                            <span class="text-sm ${priceClass}">${priceText}</span>
                        </label>
                    `;
                });

                html += `</div></div>`;
                body.innerHTML += html;
            });

            document.getElementById('custModalOverlay').classList.remove('hidden');
            document.getElementById('custModalOverlay').classList.add('show');
            document.body.style.overflow = 'hidden';
            recalcTotal();
        }

        function closeCustModal() {
            document.getElementById('custModalOverlay').classList.remove('show');
            document.getElementById('custModalOverlay').classList.add('hidden');
            document.body.style.overflow = '';
            custCurrentItem = null;
        }

        document.getElementById('custModalOverlay').addEventListener('click', function (e) {
            if (e.target === this) closeCustModal();
        });

        function recalcTotal() {
            if (!custCurrentItem) return;
            const base = parseFloat(custCurrentItem.price);
            let extra = 0;
            document.querySelectorAll('#custModalBody input:checked').forEach(inp => {
                extra += parseFloat(inp.dataset.price) || 0;
            });
            document.getElementById('custTotalDisplay').textContent = (base + extra).toFixed(0);
        }

        function confirmCustomAddToCart() {
            if (!custCurrentItem) return;
            const groups = custCurrentItem.customizations || [];
            let valid = true;
            let firstMissing = '';
            const selectedChoices = {};

            groups.forEach((group, gi) => {
                const checked = document.querySelectorAll(`#custModalBody input[name="cust_g${gi}"]:checked`);
                if (parseInt(group.is_required) === 1 && checked.length === 0) {
                    if (valid) firstMissing = group.group_name;
                    valid = false;
                }
                if (checked.length > 0) {
                    const opts = Array.isArray(group.options) ? group.options : [];
                    const labels = Array.from(checked).map(inp => (opts[parseInt(inp.value)] || {}).label).filter(Boolean);
                    selectedChoices[group.group_name] = labels.join(', ');
                }
            });

            if (!valid) {
                document.getElementById('custErrorText').textContent = `Please select an option for "${firstMissing}"`;
                document.getElementById('custErrorMsg').classList.remove('hidden');
                return;
            }

            const base = parseFloat(custCurrentItem.price);
            let extra = 0;
            document.querySelectorAll('#custModalBody input:checked').forEach(inp => {
                extra += parseFloat(inp.dataset.price) || 0;
            });
            const finalPrice = base + extra;

            const itemId = custCurrentItem.id;
            closeCustModal();
            addToCart(itemId, selectedChoices, finalPrice);
        }

        // Slider Navigation JS
        function scrollCategories(amount) {
            const container = document.getElementById('categoryScroll');
            if (container) container.scrollBy({ left: amount, behavior: 'smooth' });
        }

        let isDown = false;
        let startX;
        let scrollLeft;

        function startDrag(e) {
            isDown = true;
            const container = document.getElementById('categoryScroll');
            container.classList.remove('scroll-smooth'); // Disable smooth scroll while dragging
            startX = e.pageX - container.offsetLeft;
            scrollLeft = container.scrollLeft;
        }

        function stopDrag() {
            isDown = false;
            const container = document.getElementById('categoryScroll');
            if (container) container.classList.add('scroll-smooth');
        }

        function doDrag(e) {
            if (!isDown) return;
            e.preventDefault();
            const container = document.getElementById('categoryScroll');
            const x = e.pageX - container.offsetLeft;
            const walk = (x - startX) * 2;
            container.scrollLeft = scrollLeft - walk;
        }

        function updateScrollButtons() {
            const container = document.getElementById('categoryScroll');
            const leftBtn = document.getElementById('scrollLeftBtn');
            const rightBtn = document.getElementById('scrollRightBtn');
            if (!container || !leftBtn || !rightBtn) return;

            leftBtn.disabled = container.scrollLeft <= 0;
            rightBtn.disabled = Math.ceil(container.scrollLeft) >= container.scrollWidth - container.clientWidth;
        }

        window.addEventListener('pageshow', (event) => {
            window.hasAlertedForLogin = false;
        });
    </script>
</body>

</html>
