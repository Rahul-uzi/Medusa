<!DOCTYPE html>
<html lang="en">

<head>
<style id="nav-pt-style">

        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background-color: #120307;

        opacity: 1;
        transition: opacity 0.32s cubic-bezier(0.4, 0, 0.2, 1);
        pointer-events: all;

    #nav-page-transition.nav-pt-fadeout {
        opacity: 0 !important;

</style>

<meta http-equiv="refresh" content="0; url=register.php">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Medusa - Register">
    <title>MEDUSA - Register</title>
    <!-- Global Theme Controller -->
    <script src="assets/js/theme-toggle.js"></script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* Modern Reset and Design Tokens */
        :root {
            --gold: #dfba86;      /* Accent Soft Gold */
            --white: #FAF7F0;     /* Warm Ivory text */
            --gray-light: rgba(250, 247, 240, 0.6);
            --bg-glass: rgba(13, 32, 22, 0.65); /* Translucent Forest Green */
            --border-glass: rgba(223, 186, 134, 0.2);
            --transition: all 0.25s ease;
            --rosewood: #5A1827;
            --rosewood-light: #7E2638;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
            background-color: #0D2016; /* Deep Forest Green background */
            position: relative;
        }

        /* Centered Premium Glassmorphic Card */
        .login-container {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 380px;
            display: flex;
            flex-direction: column;
            padding: 30px 24px;
            background: var(--bg-glass);
            border: 1px solid var(--border-glass);
            border-radius: 16px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.9), 
                        inset 0 1px 0 rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            transition: var(--transition);
        }

        .login-container:hover {
            border-color: rgba(212, 175, 55, 0.25);
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.95);
        }

        /* App Branding */
        .brand-container {
            text-align: center;
            margin-bottom: 35px;
        }

        .brand-logo-img {
            width: 100px;
            height: 100px;
            object-fit: contain;
            display: block;
            margin: 0 auto;
            border-radius: 50%;
            border: 1.5px solid var(--gold);
            padding: 2px;
            background: rgba(0, 0, 0, 0.5);
            transition: var(--transition);
        }

        .brand-logo-img:hover {
            transform: scale(1.02);
        }

        /* Form Inputs styling */
        .login-form-container {
            margin-bottom: 10px;
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
            margin-bottom: 16px;
            padding: 6px 0;
            transition: var(--transition);
        }

        .input-wrapper.focused {
            border-bottom-color: var(--gold);
        }

        .input-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--white);
            opacity: 0.75;
            transition: var(--transition);
        }

        .input-wrapper.focused .input-icon {
            color: var(--gold);
        }

        .input-field {
            width: 100%;
            background: transparent;
            border: none;
            outline: none;
            color: var(--white);
            font-size: 0.92rem;
            padding-left: 12px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 500;
        }

        .input-field::placeholder {
            color: rgba(255, 255, 255, 0.4);
            font-weight: 400;
        }

        /* Prevent background autofill colors from ruining the dark visual style */
        .input-field:-webkit-autofill,
        .input-field:-webkit-autofill:hover,
        .input-field:-webkit-autofill:focus,
        .input-field:-webkit-autofill:active {
            -webkit-box-shadow: 0 0 0 30px #0D2016 inset !important;
            -webkit-text-fill-color: var(--white) !important;
            border-radius: 4px;
        }

        /* Submit Button - Minimal Matte Gold */
        .btn-submit {
            width: 100%;
            background-color: var(--rosewood);
            color: var(--gold);
            border: 1px solid var(--gold);
            padding: 12px;
            border-radius: 6px;
            font-size: 0.92rem;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            margin-bottom: 20px;
            letter-spacing: 0.5px;
        }

        .btn-submit:hover {
            background-color: var(--rosewood-light);
            color: #ffffff !important;
            transform: translateY(-1px);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        /* Member Sign up text */
        .member-text {
            text-align: center;
            color: var(--white);
            font-size: 0.82rem;
            font-weight: 500;
            opacity: 0.75;
            margin-bottom: 5px;
        }

        .member-text a {
            color: var(--gold);
            text-decoration: none;
            font-weight: 700;
            transition: var(--transition);
            margin-left: 4px;
        }

        .member-text a:hover {
            color: var(--white);
        }

        /* Small screen responsive adjustments */
        @media (max-width: 480px) {
            body {
                padding: 15px;
            }
            .login-container {
                padding: 35px 20px;
            }
            .brand-logo-img {
                width: 90px;
                height: 90px;
            }
        }
    </style>

    <!-- CRITICAL SPA PAGE TRANSITION CSS & SCRIPT -->
    <style>
        html, body { background-color: #120307; }
        #nav-page-transition {
            position: fixed;
            inset: 0;
            z-index: 99999;
            background: #120307;
            pointer-events: all;
            opacity: 1;
            transition: opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #nav-page-transition.nav-pt-fadeout {
            opacity: 0;
            pointer-events: none;
        }
    </style>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            var overlay = document.getElementById('nav-page-transition');
            if(overlay) {
                setTimeout(function() {
                    overlay.classList.add('nav-pt-fadeout');
                }, 100);
            }
        });
    </script>
</head>

<body>
<div id="nav-page-transition"></div>

<!-- Centered Glassmorphic Register Container -->
    <div class="login-container">
        <!-- Brand Header Area -->
        <div class="brand-container">
            <img class="brand-logo-img" src="assets/images/medusaa2(onlylogo).png" alt="Medusa Logo">
        </div>

        <!-- Register Form Area -->
        <div class="login-form-container">
            <form id="registerForm">
                <!-- First & Last Name row -->
                <div style="display: flex; gap: 12px; width: 100%;">
                    <!-- First Name input -->
                    <div class="input-wrapper" style="flex: 1;">
                        <span class="input-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                                <circle cx="12" cy="7" r="4"></circle>
                            </svg>
                        </span>
                        <input type="text" id="first-name" class="input-field" placeholder="FIRST NAME" required autocomplete="given-name">
                    </div>
                    <!-- Last Name input -->
                    <div class="input-wrapper" style="flex: 1;">
                        <span class="input-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                                <circle cx="12" cy="7" r="4"></circle>
                            </svg>
                        </span>
                        <input type="text" id="last-name" class="input-field" placeholder="LAST NAME" required autocomplete="family-name">
                    </div>
                </div>

                <!-- Mobile Number input -->
                <div class="input-wrapper">
                    <span class="input-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>
                        </svg>
                    </span>
                    <input type="tel" id="phone" class="input-field" placeholder="MOBILE NUMBER" required autocomplete="tel" pattern="[0-9]{10}" maxlength="10" title="Mobile number must be exactly 10 digits">
                </div>

                <!-- Email input -->
                <div class="input-wrapper">
                    <span class="input-icon">
                        <!-- @ symbol icon -->
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="4"></circle>
                            <path d="M16 8v5a3 3 0 0 0 6 0v-1a10 10 0 1 0-3.92 7.94"></path>
                        </svg>
                    </span>
                    <input type="email" id="email" class="input-field" placeholder="E-MAIL" required autocomplete="email">
                </div>

                <!-- Password input -->
                <div class="input-wrapper">
                    <span class="input-icon">
                        <!-- Lock icon -->
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg>
                    </span>
                    <input type="password" id="password" class="input-field" placeholder="PASSWORD" required autocomplete="new-password">
                </div>

                <!-- Confirm Password input -->
                <div class="input-wrapper">
                    <span class="input-icon">
                        <!-- Lock icon -->
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg>
                    </span>
                    <input type="password" id="confirm-password" class="input-field" placeholder="CONFIRM PASSWORD" required autocomplete="new-password">
                </div>

                <!-- Submit Button -->
                <button type="submit" class="btn-submit">Join Now</button>

                <!-- Already a Member / Login -->
                <div class="member-text">
                    Already a Member? <a href="login.html">Login Now</a>
                </div>
            </form>
        </div>
    </div>

    <!-- Javascript focus interaction and registration fetch execution logic -->
    <script>
        // Add visual focus class to input wrappers
        const inputs = document.querySelectorAll('.input-field');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.closest('.input-wrapper').classList.add('focused');
            });
            input.addEventListener('blur', () => {
                input.closest('.input-wrapper').classList.remove('focused');
            });
        });

        // Form Submit Handler
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const firstNameVal = document.getElementById('first-name').value.trim();
            const lastNameVal = document.getElementById('last-name').value.trim();
            const emailVal = document.getElementById('email').value.trim();
            const phoneVal = document.getElementById('phone').value.trim();
            const passwordVal = document.getElementById('password').value;
            const confirmVal = document.getElementById('confirm-password').value;

            // Enforce exactly 10 digits for mobile number
            const phonePattern = /^[0-9]{10}$/;
            if (!phonePattern.test(phoneVal)) {
                alert('Mobile number must be exactly 10 digits.');
                return;
            }

            if (passwordVal !== confirmVal) {
                alert('Passwords do not match.');
                return;
            }

            const data = {
                name: `${firstNameVal} ${lastNameVal}`,
                email: emailVal,
                phone: phoneVal,
                password: passwordVal
            };
            
            try {
                const res = await fetch('api/register.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await res.json();
                if (result.success) {
                    alert('Registration successful! Please login.', () => {
                        window.location.href = 'login.html';
                    });
                } else {
                    alert(result.message || 'Registration failed. Please try again.');
                }
            } catch (err) {
                console.error('Error during registration fetch:', err);
                alert('Network error or server unavailable. Please try again later.');
            }
        });
    </script>
</body>

</html>
