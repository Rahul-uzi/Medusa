<!DOCTYPE html>
<html>
<head>
    <title>Medusa Careers Test Helper</title>
</head>
<body>
    <h1>Testing submission...</h1>
    <script>
        const pdfContent = `%PDF-1.4
1 0 obj
<< /Type /Catalog /Pages 2 0 R >>
endobj
2 0 obj
<< /Type /Pages /Kids [3 0 R] /Count 1 >>
endobj
3 0 obj
<< /Type /Page /Parent 2 0 R /MediaBox [0 0 595 842] /Resources << >> /Contents 4 0 R >>
endobj
4 0 obj
<< /Length 10 >>
stream
()
endstream
endobj
xref
0 5
0000000000 65535 f 
0000000009 00000 n 
0000000058 00000 n 
0000000115 00000 n 
0000000212 00000 n 
trailer
<< /Size 5 /Root 1 0 R >>
startxref
271
%%EOF`;

        const blob = new Blob([pdfContent], { type: 'application/pdf' });
        const file = new File([blob], "dummy_resume.pdf", { type: "application/pdf" });

        const formData = new FormData();
        formData.append('full_name', 'John Doe');
        formData.append('email', 'johndoe@example.com');
        formData.append('mobile', '9876543210');
        formData.append('position', 'Head Chef');
        formData.append('experience', '5');
        formData.append('city', 'Chandigarh');
        formData.append('expected_salary', '45000');
        formData.append('cover_letter', 'I am excited to apply for the Head Chef role at Medusa. This is an automated verification test.');
        formData.append('resume', file);

        fetch('api/submit-career.php', {
            method: 'POST',
            body: formData
        })
        .then(res => res.json())
        .then(data => {
            document.body.innerHTML = "<h1>Test Complete</h1><pre id='result'>" + JSON.stringify(data, null, 2) + "</pre>";
        })
        .catch(err => {
            document.body.innerHTML = "<h1>Test Failed</h1><pre id='result'>" + err + "</pre>";
        });
    </script>
</body>
</html>
