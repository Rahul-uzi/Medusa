<!DOCTYPE html>
<html lang="en">

<head>
<style id="nav-pt-style">
    #nav-page-transition {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background-color: #120307;
        z-index: 999999;
        opacity: 1;
        transition: opacity 0.32s cubic-bezier(0.4, 0, 0.2, 1);
        pointer-events: all;
    }
    #nav-page-transition.nav-pt-fadeout {
        opacity: 0 !important;
        pointer-events: none !important;
    }
</style>

<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Medusa - Login">
    <title>MEDUSA - Login</title>
    <!-- Global Theme Controller -->
    <script src="assets/js/theme-toggle.js"></script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* Modern Reset and Design Tokens */
        :root {
            --gold: #dfba86;      /* Accent Soft Gold */
            --white: #FAF7F0;     /* Warm Ivory text */
            --gray-light: rgba(250, 247, 240, 0.6);
            --bg-glass: rgba(13, 32, 22, 0.65); /* Translucent Forest Green */
            --border-glass: rgba(223, 186, 134, 0.2);
            --transition: all 0.25s ease;
            --rosewood: #5A1827;
            --rosewood-light: #7E2638;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
            background-color: #0D2016; /* Deep Forest Green background */
            position: relative;
        }

        /* Centered Premium Glassmorphic Card */
        .login-container {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 360px;
            display: flex;
            flex-direction: column;
            padding: 40px 30px;
            background: var(--bg-glass);
            border: 1px solid var(--border-glass);
            border-radius: 16px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.9), 
                        inset 0 1px 0 rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            transition: var(--transition);
        }

        .login-container:hover {
            border-color: rgba(212, 175, 55, 0.25);
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.95);
        }

        /* App Branding */
        .brand-container {
            text-align: center;
            margin-bottom: 35px;
        }

        .brand-logo-img {
            width: 100px;
            height: 100px;
            object-fit: contain;
            display: block;
            margin: 0 auto;
            border-radius: 50%;
            border: 1.5px solid var(--gold);
            padding: 2px;
            background: rgba(0, 0, 0, 0.5);
            transition: var(--transition);
        }

        .brand-logo-img:hover {
            transform: scale(1.02);
        }

        /* Form Inputs styling */
        .login-form-container {
            margin-bottom: 10px;
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
            margin-bottom: 22px;
            padding: 6px 0;
            transition: var(--transition);
        }

        .input-wrapper.focused {
            border-bottom-color: var(--gold);
        }

        .input-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--white);
            opacity: 0.75;
            transition: var(--transition);
        }

        .input-wrapper.focused .input-icon {
            color: var(--gold);
        }

        .input-field {
            width: 100%;
            background: transparent;
            border: none;
            outline: none;
            color: var(--white);
            font-size: 0.92rem;
            padding-left: 12px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 500;
        }

        .input-field::placeholder {
            color: rgba(255, 255, 255, 0.4);
            font-weight: 400;
        }

        /* Prevent background autofill colors from ruining the dark visual style */
        .input-field:-webkit-autofill,
        .input-field:-webkit-autofill:hover,
        .input-field:-webkit-autofill:focus,
        .input-field:-webkit-autofill:active {
            -webkit-box-shadow: 0 0 0 30px #0D2016 inset !important;
            -webkit-text-fill-color: var(--white) !important;
            border-radius: 4px;
        }

        /* Remember Me & Forgot Password Row */
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            font-size: 0.8rem;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--gray-light);
            cursor: pointer;
            user-select: none;
            transition: var(--transition);
            font-weight: 500;
        }

        .remember-me:hover {
            color: var(--white);
        }

        .remember-me input {
            display: none;
        }

        .checkbox-custom {
            width: 14px;
            height: 14px;
            border: 1.2px solid rgba(255, 255, 255, 0.3);
            border-radius: 3px;
            position: relative;
            transition: var(--transition);
            background: rgba(0, 0, 0, 0.3);
        }

        .remember-me input:checked + .checkbox-custom {
            background-color: var(--gold);
            border-color: var(--gold);
        }

        .remember-me input:checked + .checkbox-custom::after {
            content: '';
            position: absolute;
            left: 4px;
            top: 1px;
            width: 3px;
            height: 6px;
            border: solid #000000;
            border-width: 0 1.5px 1.5px 0;
            transform: rotate(45deg);
        }

        /* Forgot Password link */
        .forgot-password-link {
            color: var(--gold);
            text-decoration: none;
            font-weight: 600;
            transition: var(--transition);
        }

        .forgot-password-link:hover {
            color: var(--white);
        }

        /* Submit Button - Minimal Matte Gold */
        .btn-submit {
            width: 100%;
            background-color: var(--rosewood);
            color: var(--gold);
            border: 1px solid var(--gold);
            padding: 12px;
            border-radius: 6px;
            font-size: 0.92rem;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            margin-bottom: 20px;
            letter-spacing: 0.5px;
        }

        .btn-submit:hover {
            background-color: var(--rosewood-light);
            color: #ffffff !important;
            transform: translateY(-1px);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        /* Member Sign up text */
        .member-text {
            text-align: center;
            color: var(--white);
            font-size: 0.82rem;
            font-weight: 500;
            opacity: 0.75;
            margin-bottom: 5px;
        }

        .member-text a {
            color: var(--gold);
            text-decoration: none;
            font-weight: 700;
            transition: var(--transition);
            margin-left: 4px;
        }

        .member-text a:hover {
            color: var(--white);
        }

        /* Social Icons container */
        .social-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 15px;
        }

        .social-link {
            color: var(--white);
            opacity: 0.75;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }

        .social-link:hover {
            color: var(--gold);
            opacity: 1;
            transform: scale(1.1);
        }

        /* Small screen responsive adjustments */
        @media (max-width: 480px) {
            body {
                padding: 15px;
            }
            .login-container {
                padding: 35px 20px;
            }
            .brand-logo-img {
                width: 90px;
                height: 90px;
            }
        }
    </style>

    <!-- CRITICAL SPA PAGE TRANSITION CSS & SCRIPT -->
    <style>
        html, body { background-color: #120307; }
        #nav-page-transition {
            position: fixed;
            inset: 0;
            z-index: 99999;
            background: #120307;
            pointer-events: all;
            opacity: 1;
            transition: opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #nav-page-transition.nav-pt-fadeout {
            opacity: 0;
            pointer-events: none;
        }
    </style>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            var overlay = document.getElementById('nav-page-transition');
            if(overlay) {
                setTimeout(function() {
                    overlay.classList.add('nav-pt-fadeout');
                }, 100);
            }
        });
    </script>
</head>

<body>
<div id="nav-page-transition"></div>

<!-- Centered Glassmorphic Login Container -->
    <div class="login-container">
        <!-- Brand Header Area -->
        <div class="brand-container">
            <img class="brand-logo-img" src="assets/images/versace_logo.png" alt="Medusa Logo">
        </div>

        <!-- Login Form Area -->
        <div class="login-form-container">
            <form id="loginForm">
                <!-- Email input -->
                <div class="input-wrapper">
                    <span class="input-icon">
                        <!-- @ symbol icon -->
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="4"></circle>
                            <path d="M16 8v5a3 3 0 0 0 6 0v-1a10 10 0 1 0-3.92 7.94"></path>
                        </svg>
                    </span>
                    <input type="email" id="email" class="input-field" placeholder="E-MAIL" required autocomplete="email">
                </div>

                <!-- Password input -->
                <div class="input-wrapper">
                    <span class="input-icon">
                        <!-- Lock icon -->
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg>
                    </span>
                    <input type="password" id="password" class="input-field" placeholder="PASSWORD" required autocomplete="current-password">
                </div>

                <!-- Remember Me & Forgot Password Options Row -->
                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" id="remember">
                        <span class="checkbox-custom"></span>
                        Remember Me
                    </label>
                    <a href="#" class="forgot-password-link">Forgot Password</a>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="btn-submit">Log in</button>

                <!-- Not a Member / Join Now -->
                <div class="member-text">
                    Not a Member? <a href="register.html">Join Now</a>
                </div>

                <!-- Social Links Area -->
                <div class="social-container">
                    <!-- Google -->
                    <a href="#" class="social-link" aria-label="Sign in with Google">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09zM12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23zM5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63zM12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
                        </svg>
                    </a>
                    
                    <!-- Facebook -->
                    <a href="#" class="social-link" aria-label="Sign in with Facebook">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M22 12c0-5.52-4.48-10-10-10S2 6.48 2 12c0 4.84 3.44 8.87 8 9.8V15H8v-3h2V9.5C10 7.57 11.57 6 13.5 6H16v3h-2c-.55 0-1 .45-1 1v2h3v3h-3v6.95c4.56-.93 8-4.96 8-9.75z" />
                        </svg>
                    </a>

                    <!-- Twitter -->
                    <a href="#" class="social-link" aria-label="Sign in with Twitter">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M23.953 4.57c-.88.39-1.834.65-2.825.775 1.014-.611 1.794-1.574 2.163-2.723-.951.555-2.005.959-3.127 1.184-.896-.957-2.173-1.555-3.594-1.555-3.179 0-5.515 2.966-4.797 6.045-4.091-.205-7.719-2.165-10.148-5.144-1.29 2.213-.669 5.108 1.523 6.574-.806-.026-1.566-.247-2.229-.616-.054 2.281 1.581 4.415 3.949 4.89-.693.188-1.452.232-2.224.084.626 1.956 2.444 3.379 4.6 3.419-2.07 1.623-4.678 2.348-7.29 2.04 2.179 1.397 4.768 2.212 7.548 2.212 9.142 0 14.307-7.721 13.995-14.646.962-.695 1.797-1.562 2.457-2.549z" />
                        </svg>
                    </a>
                </div>
            </form>
        </div>
    </div>

    <!-- Javascript focus interaction and login fetch execution logic -->
    <script>
        // Add visual focus class to input wrappers
        const inputs = document.querySelectorAll('.input-field');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.closest('.input-wrapper').classList.add('focused');
            });
            input.addEventListener('blur', () => {
                input.closest('.input-wrapper').classList.remove('focused');
            });
        });

        // Form Submit Handler
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const emailVal = document.getElementById('email').value;
            const passwordVal = document.getElementById('password').value;
            const rememberMe = document.getElementById('remember').checked;

            const data = {
                email: emailVal,
                password: passwordVal,
                remember: rememberMe
            };
            
            try {
                const res = await fetch('api/login.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await res.json();
                if (result.success) {
                    alert('Login successful', () => {
                        if (result.user && result.user.role === 'admin') {
                            window.location.href = 'admintest/dashboardtest.php';
                        } else {
                            window.location.href = 'menutest.html';
                        }
                    });
                } else {
                    alert(result.message || 'Login failed. Please check your credentials.');
                }
            } catch (err) {
                console.error('Error during login fetch:', err);
                alert('Network error or server unavailable. Please try again later.');
            }
        });
    </script>
</body>

</html>
