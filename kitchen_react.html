<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Medusa - Kitchen Panel</title>
<!-- Global Theme Controller -->
<script src="assets/js/theme-toggle.js"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<style>
:root {
  --bg: #0a0a14; --bg-card: #12121e; --bg-card2: #1a1a2e; --bg-hover: #222240;
  --gold: #d4af37; --gold-dim: rgba(212,175,55,0.15);
  --green: #22c55e; --orange: #f59e0b; --red: #ef4444; --blue: #3b82f6; --purple: #a855f7;
  --text: #e8e8f0; --text-dim: #8888aa; --text-muted: #555577;
  --border: #1e1e32; --border-light: #2a2a44;
  --radius: 10px; --radius-sm: 6px; --font: 'Segoe UI', system-ui, sans-serif; --font-mono: 'Courier New', monospace;
}
* { margin:0; padding:0; box-sizing:border-box; }
html,body{height:100%}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:15px;line-height:1.5;overflow-x:hidden}
#loading{position:fixed;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg);z-index:9999;color:var(--gold);font-size:1.1rem;font-weight:700}
#loading .spinner{width:36px;height:36px;border:3px solid var(--border-light);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:14px}
@keyframes spin{to{transform:rotate(360deg)}}
#root{display:none}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border-light);border-radius:3px}
button{cursor:pointer;font-family:inherit}
.header{background:linear-gradient(135deg,#0f0f1e 0%,#1a0f2e 100%);border-bottom:1px solid var(--gold);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;position:sticky;top:0;z-index:100}
.header h1{font-size:1.3rem;font-weight:800;color:var(--gold);letter-spacing:1.5px}
.header h1 span{color:var(--text);font-weight:400;letter-spacing:0}
.header-info{display:flex;align-items:center;gap:14px;font-size:0.8rem;color:var(--text-dim)}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--green);display:inline-block;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.filters{display:flex;gap:6px;padding:10px 20px;flex-wrap:wrap;background:rgba(255,255,255,0.01);border-bottom:1px solid var(--border);overflow-x:auto;-webkit-overflow-scrolling:touch}
.filter-btn{padding:5px 12px;border-radius:16px;border:1px solid var(--border-light);background:transparent;color:var(--text-dim);font-size:0.75rem;font-weight:500;transition:all .2s;white-space:nowrap;flex-shrink:0}
.filter-btn.active{background:var(--gold);color:#0a0a0f;border-color:var(--gold);font-weight:700}
.filter-btn:hover:not(.active){border-color:var(--gold);color:var(--text)}
.main{flex:1;padding:0;width:100%}
.empty-state{text-align:center;padding:60px 20px;color:var(--text-muted)}
.empty-state svg{opacity:0.2;margin-bottom:12px}
.empty-state p{font-size:0.95rem}
.order-card{background:var(--bg-card);border-bottom:1px solid var(--border);transition:background .15s}
.order-card:hover{background:var(--bg-card2)}
.order-header{display:flex;align-items:center;justify-content:space-between;padding:12px 20px;cursor:pointer;gap:10px;-webkit-tap-highlight-color:transparent;user-select:none}
.order-header-left{display:flex;align-items:center;gap:10px;min-width:0}
.order-id{font-size:1rem;font-weight:700;color:var(--gold);font-family:var(--font-mono);white-space:nowrap}
.status-badge{padding:2px 8px;border-radius:10px;font-size:0.65rem;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;white-space:nowrap;border:1px solid transparent}
.status-pending{background:rgba(245,158,11,0.12);color:var(--orange);border-color:rgba(245,158,11,0.25)}
.status-confirmed{background:rgba(59,130,246,0.12);color:var(--blue);border-color:rgba(59,130,246,0.25)}
.status-preparing{background:rgba(168,85,247,0.12);color:var(--purple);border-color:rgba(168,85,247,0.25)}
.status-ready{background:rgba(34,197,94,0.12);color:var(--green);border-color:rgba(34,197,94,0.25)}
.status-delivered{background:rgba(100,100,130,0.12);color:var(--text-dim);border-color:rgba(100,100,130,0.25)}
.status-settled{background:rgba(34,197,94,0.06);color:var(--text-muted);border-color:rgba(34,197,94,0.12)}
.order-meta{display:flex;align-items:center;gap:12px;font-size:0.75rem;color:var(--text-dim);flex-wrap:wrap}
.order-meta-item{display:flex;align-items:center;gap:3px}
.chevron{transition:transform .25s ease;color:var(--text-muted);flex-shrink:0}
.chevron.open{transform:rotate(180deg)}
.order-body{padding:0 20px 14px;display:none}
.expanded .order-body{display:block}
.order-items{margin-bottom:10px}
.order-item{display:flex;align-items:flex-start;gap:10px;padding:7px 0;border-bottom:1px solid var(--border);font-size:0.82rem}
.order-item:last-of-type{border-bottom:none}
.order-item-thumb{width:34px;height:34px;border-radius:var(--radius-sm);object-fit:cover;background:var(--bg);flex-shrink:0;margin-top:2px}
.order-item-info{flex:1;min-width:0}
.order-item-name{font-weight:600;color:var(--text)}
.order-item-options{font-size:0.68rem;color:var(--text-dim);margin-top:1px;line-height:1.3}
.order-item-qty{font-weight:700;color:var(--text);white-space:nowrap;margin-right:6px}
.order-item-price{color:var(--gold);font-weight:600;white-space:nowrap}
.order-item-remove{color:var(--red);background:none;border:none;padding:2px 4px;border-radius:3px;opacity:0.5;transition:opacity .15s;flex-shrink:0;cursor:pointer}
.order-item-remove:hover{opacity:1}
.order-total{display:flex;justify-content:space-between;padding:8px 0;border-top:1px solid var(--border-light);font-weight:700;font-size:0.88rem}
.order-total span:last-child{color:var(--gold)}
.order-actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.action-btn{padding:7px 14px;border-radius:var(--radius-sm);border:none;font-size:0.75rem;font-weight:700;transition:all .15s;white-space:nowrap}
.action-btn:active{transform:scale(0.96)}
.confirm-btn{background:var(--green);color:#0a0a0f}
.confirm-btn:hover{opacity:0.85}
.prepare-btn{background:var(--purple);color:#fff}
.prepare-btn:hover{opacity:0.85}
.ready-btn{background:var(--green);color:#0a0a0f}
.ready-btn:hover{opacity:0.85}
.deliver-btn{background:var(--blue);color:#fff}
.deliver-btn:hover{opacity:0.85}
.edit-btn{background:var(--gold-dim);color:var(--gold);border:1px solid rgba(212,175,55,0.3)}
.edit-btn:hover{background:rgba(212,175,55,0.25)}
.cancel-btn{background:rgba(239,68,68,0.12);color:var(--red);border:1px solid rgba(239,68,68,0.25)}
.cancel-btn:hover{background:rgba(239,68,68,0.2)}
.time-ago{font-size:0.68rem;color:var(--text-muted);white-space:nowrap}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:1000;padding:16px}
.modal-content{background:var(--bg-card);border:1px solid var(--border-light);border-radius:var(--radius);width:100%;max-width:520px;max-height:85vh;display:flex;flex-direction:column;box-shadow:0 16px 48px rgba(0,0,0,0.5)}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.modal-header h2{font-size:1rem;font-weight:700;color:var(--gold)}
.modal-close{color:var(--text-dim);background:none;border:none;padding:4px;border-radius:4px;cursor:pointer}
.modal-close:hover{color:var(--text)}
.modal-body{padding:12px 16px;overflow-y:auto;flex:1}
.menu-categories{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px}
.menu-cat-btn{padding:4px 10px;border-radius:12px;border:1px solid var(--border-light);background:transparent;color:var(--text-dim);font-size:0.7rem;transition:all .15s;white-space:nowrap;cursor:pointer}
.menu-cat-btn.active{background:var(--gold);color:#0a0a0f;border-color:var(--gold)}
.menu-cat-btn:hover:not(.active){border-color:var(--gold);color:var(--text)}
.menu-items{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px}
.menu-item-card{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--bg-card2);border:1px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;transition:all .15s}
.menu-item-card:hover{border-color:var(--gold);background:var(--bg-hover)}
.menu-item-card:active{transform:scale(0.98)}
.menu-item-img{width:40px;height:40px;border-radius:4px;object-fit:cover;background:var(--bg);flex-shrink:0}
.menu-item-info{flex:1;min-width:0}
.menu-item-name{font-weight:600;font-size:0.8rem;color:var(--text)}
.menu-item-meta{font-size:0.65rem;color:var(--text-dim);margin-top:1px}
.menu-item-price{color:var(--gold);font-weight:700;font-size:0.8rem;white-space:nowrap}
.toast-container{position:fixed;left:16px;right:16px;bottom:20px;z-index:2000;display:flex;flex-direction:column;align-items:center;gap:8px;pointer-events:none}
.toast{background:var(--bg-card);border:1px solid var(--border-light);border-left:3px solid var(--gold);padding:10px 16px;border-radius:var(--radius-sm);font-size:0.82rem;color:var(--text);box-shadow:0 8px 24px rgba(0,0,0,0.4);pointer-events:auto;animation:toastIn .3s ease;max-width:90%}
@keyframes toastIn{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
@media(max-width:600px){
  .header{padding:10px 14px}
  .header h1{font-size:1.1rem}
  .order-header{padding:10px 14px}
  .order-body{padding:0 14px 12px}
  .order-meta{gap:6px;font-size:0.68rem}
  .filters{padding:8px 14px}
  .menu-items{grid-template-columns:1fr}
  .modal-content{max-width:100%;max-height:90vh;border-radius:var(--radius-sm);margin:8px}
}
@media(min-width:1025px){
  .main{max-width:900px;margin:0 auto}
  .order-header{padding:14px 24px}
  .order-body{padding:0 24px 16px}
  .menu-items{grid-template-columns:repeat(2,1fr)}
}
@media print {
  body * { visibility: hidden; }
  .modal-overlay, .modal-content, .modal-content * { visibility: visible; }
  .modal-overlay { position: absolute; left: 0; top: 0; padding: 0; background: transparent; backdrop-filter: none; }
  .modal-content { box-shadow: none; border: none; max-width: 100%; width: 100%; background: #fff !important; color: #000 !important; }
  .modal-close, .action-btn { display: none !important; }
  body { background: #fff !important; }
  h2, span, div { color: #000 !important; }
}
</style>
</head>

var tid=0;
function toast(m){var c=document.getElementById('toastContainer'),e=document.createElement('div');e.className='toast';e.textContent=m;c.appendChild(e);setTimeout(function(){e.remove()},2500)}

function Header(props){return h('div',{className:'header'},h('h1',null,'MEDUSA ',h('span',null,'Kitchen')),h('div',{className:'header-info'},h('span',null,props.total+' orders'+(props.pending>0?' ('+props.pending+' pending)':'')),h('span',{className:'live-dot'}),h('span',{style:{fontSize:'0.72rem',color:'var(--text-muted)'}},'Live')))}

      h('svg',{width:14,height:14,viewBox:'0 0 24 24',fill:'none',stroke:'currentColor',strokeWidth:2,strokeLinecap:'round'},h('path',{d:'M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2'}))
    ):null

}

function OrderActions(props){
  var o=props.order,btns=[],onC=props.onConfirm,onS=props.onStatus,onE=props.onEdit,onB=props.onBill,onX=props.onCancel;
  if(o.status==='pending'){btns.push(h('button',{key:'cf',className:'action-btn confirm-btn',onClick:function(){onC(o.id)}},'Confirm Order'));btns.push(h('button',{key:'ed',className:'action-btn edit-btn',onClick:function(){onE(o)}},'Add / Remove Items'));btns.push(h('button',{key:'cx',className:'action-btn cancel-btn',onClick:function(){if(confirm('Cancel order '+o.id+'? All items will be removed.'))onX(o.id)}},'Cancel Order'))}
  if(o.status==='confirmed')btns.push(h('button',{key:'pr',className:'action-btn prepare-btn',onClick:function(){onS(o.id,'preparing')}},'Start Preparing'));
  if(o.status==='preparing')btns.push(h('button',{key:'rd',className:'action-btn ready-btn',onClick:function(){onS(o.id,'ready')}},'Mark Ready'));
  if(o.status==='ready')btns.push(h('button',{key:'dl',className:'action-btn deliver-btn',onClick:function(){onS(o.id,'delivered')}},'Mark Delivered'));
  if(o.status==='delivered')btns.push(h('button',{key:'bl',className:'action-btn ready-btn',onClick:function(){onB(o)}},'Bill'));
  return btns.length?h('div',{className:'order-actions'},btns):null;

  return h('div',{className:'order-card'+(ex?' expanded':'')},

    h('div',{className:'modal-overlay',onClick:function(e){if(e.target===e.currentTarget)props.onClose()}},
      h('div',{className:'modal-content'},
        h('div',{className:'modal-header'},h('h2',null,'Add Item to '+props.order.id),h('button',{className:'modal-close',onClick:props.onClose},h('svg',{width:20,height:20,viewBox:'0 0 24 24',fill:'none',stroke:'currentColor',strokeWidth:2,strokeLinecap:'round'},h('path',{d:'M18 6L6 18M6 6l12 12'})))),
        h('div',{className:'modal-body'},
          h('div',{className:'menu-categories'},menuCats.map(function(x){return h('button',{key:x.id,className:'menu-cat-btn'+(c===x.id?' active':''),onClick:function(){setCat(x.id)}},x.name)})),

            h('span',{className:'menu-item-price'},fmt(mi.price))

function App(){
  var o=React.useState([]),setOrders=o[1],orders=o[0];
  var f=React.useState('all'),setFilter=f[1],filter=f[0];
  var eo=React.useState(null),setEdit=eo[1],edit=eo[0];
  var [bo,setBill]=React.useState(null);
  var [view,setView]=React.useState('orders');
  var [eventTick,setEventTick]=React.useState(0);

  var fetchOrders=useCallback(function(){
    fetch(API+'/api/orders').then(function(r){return r.json()}).then(function(d){setOrders(d.orders||[])}).catch(function(){});
  },[]);

  useEffect(function(){
    fetchOrders();
  },[fetchOrders]);

  useEffect(function(){
    if(!window.EventSource)return;
    var events=new EventSource(API+'/api/events');
    events.addEventListener('update',function(e){
      try{
        var msg=JSON.parse(e.data);
        if(msg.type==='orders')fetchOrders();
        if(msg.type==='tables'||msg.type==='orders')setEventTick(function(v){return v+1});
      }catch(err){
        fetchOrders();
        setEventTick(function(v){return v+1});
      }
    });
    events.onerror=function(){};
    return function(){events.close()};
  },[fetchOrders]);

  var filtered=filter==='all'?orders:orders.filter(function(o){return o.status===filter});
  var total=orders.length,pc=orders.filter(function(o){return o.status==='pending'}).length;

  function confirmOrder(id){
    fetch(API+'/api/orders/'+encodeURIComponent(id)+'/confirm',{method:'PUT'})
      .then(function(r){if(!r.ok)throw Error();toast('Order '+id+' confirmed');fetchOrders()})
      .catch(function(e){toast('Error: '+(e.message||'failed'))});
  }
  function updateStatus(id,status){
    fetch(API+'/api/orders/'+encodeURIComponent(id)+'/status',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({status:status})})
      .then(function(r){if(!r.ok)throw Error();var lb={confirmed:'Confirmed',preparing:'Preparing',ready:'Ready',delivered:'Delivered'};toast('Order '+id+' marked as '+lb[status]);fetchOrders()})
      .catch(function(e){toast('Error: '+(e.message||'failed'))});
  }
  function updateItemStatus(oid,idx,status){
    fetch(API+'/api/orders/'+encodeURIComponent(oid)+'/items/'+idx+'/status',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({status:status})})
      .then(function(r){if(!r.ok)throw Error();toast('Item updated to '+status);fetchOrders()})
      .catch(function(e){toast('Error: '+(e.message||'failed'))});
  }
  function removeItem(oid,idx){
    if(!confirm('Remove this item?'))return;
    fetch(API+'/api/orders/'+encodeURIComponent(oid)+'/items/'+idx,{method:'DELETE'})
      .then(function(r){if(!r.ok)throw Error();toast('Item removed');fetchOrders()})
      .catch(function(e){toast('Error: '+(e.message||'failed'))});
  }
  function cancelOrder(id){
    fetch(API+'/api/orders/'+encodeURIComponent(id),{method:'DELETE'})
      .then(function(r){if(!r.ok)throw Error();toast('Order '+id+' cancelled');fetchOrders()})
      .catch(function(e){toast('Error: '+(e.message||'failed'))});
  }

  return h(React.Fragment,null,
    h(Header,{total:total,pending:pc}),
    h('div',{style:{display:'flex',gap:'6px',padding:'6px 20px',background:'rgba(255,255,255,0.01)',borderBottom:'1px solid var(--border)'}},
      h('button',{className:'filter-btn'+(view==='orders'?' active':''),onClick:function(){setView('orders')}},'Orders'),
      h('button',{className:'filter-btn'+(view==='tables'?' active':''),onClick:function(){setView('tables')}},'Tables')
    ),
    view==='tables'?h(TablesView,{refreshKey:eventTick,onRefresh:function(){fetchOrders();setEventTick(function(v){return v+1})},onGoToOrders:function(){setView('orders')}}):h(React.Fragment,null,
      h(Filters,{cur:filter,onChange:setFilter}),
      h('div',{className:'main'},
        filtered.length===0?
          h('div',{className:'empty-state'},
            h('svg',{viewBox:'0 0 24 24',width:40,height:40,fill:'none',stroke:'currentColor',strokeWidth:1.5,strokeLinecap:'round'},h('path',{d:'M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5'})),
            h('p',null,'No '+(filter!=='all'?filter:'')+' orders')
          ):
          filtered.map(function(o){return h(OrderCard,{
            key:o.id,
            order:o,
            onConfirm:confirmOrder,
            onStatus:updateStatus,
            onEdit:setEdit,
            onBill:setBill,
            onCancel:cancelOrder,
            onItemStatus:function(idx,st){updateItemStatus(o.id,idx,st)},
            onRemoveItem:function(idx){removeItem(o.id,idx)}
          })})
      )
    ),
    edit?h(MenuBrowser,{order:edit,onClose:function(){setEdit(null)},onRefresh:fetchOrders}):null,
    bo?h(BillModal,{order:bo,onClose:function(){setBill(null)},onSettled:fetchOrders}):null
  );
}

try {
  ReactDOM.createRoot(document.getElementById('root')).render(h(App));
  document.getElementById('loading').style.display='none';
  document.getElementById('root').style.display='block';
} catch (err) {
  console.error(err);
  document.getElementById('loading').innerHTML = '<div style="max-width:520px;text-align:center;line-height:1.5;padding:20px;"><strong>Kitchen failed to start.</strong><br><span style="color:#8888aa;font-size:0.9rem;">Open DevTools Console for the exact error, then refresh after saving fixes.</span></div>';
}
</script>
